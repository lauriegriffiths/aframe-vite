<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>A-Frame People Demo</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-text-geometry-component/dist/aframe-text-geometry-component.min.js"></script>
    <style>
      #loading {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-family: sans-serif;
        font-size: 1.5em;
        z-index: 999;
        background: rgba(0, 0, 0, 0.6);
        padding: 1em 2em;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div id="loading">Loading people data...</div>

    <a-scene id="main-scene">
      <a-sky
        id="sky"
        color="#1a1a2e"
        animation__color="property: color; dur: 800; easing: easeInOutQuad; startEvents: colorchange"
      >
      </a-sky>

      <a-assets id="assets">
        <a-asset-item
          id="font"
          src="https://cdn.aframe.io/fonts/mozillavr.fnt"
        ></a-asset-item>
      </a-assets>

      <!-- Floor -->
      <a-plane
        id="floor"
        position="0 0 -5"
        rotation="-90 0 0"
        width="40"
        height="20"
        color="#16213e"
        roughness="0.8"
      >
      </a-plane>

      <!-- Lighting -->
      <a-light
        id="ambient-light"
        type="ambient"
        color="#ffffff"
        intensity="1.2"
      ></a-light>
      <a-light
        id="directional-light"
        type="directional"
        color="#ffffff"
        intensity="1.8"
        position="2 4 2"
      ></a-light>

      <!-- Camera -->
      <a-entity id="camera-rig" position="0 2 4">
        <a-camera id="camera" look-controls wasd-controls>
          <a-cursor
            id="cursor"
            color="#ffffff"
            opacity="0.8"
            raycaster="objects: .interactive"
          >
          </a-cursor>
        </a-camera>
      </a-entity>

      <!-- Scene title (3D extruded text) -->
      <a-entity
        id="scene-title"
        text-geometry="value: A-Frame People Demo; size: 0.4; height: 0.12; curveSegments: 6; font: /helvetiker_regular.typeface.json"
        material="color: #e94560; metalness: 0.4; roughness: 0.3"
        position="-3.2 5 -6"
      >
      </a-entity>

      <!-- Info panel — shown when a column is clicked -->
      <a-entity id="info-panel" position="0 6.81924 -5" visible="false">
        <a-plane
          id="info-panel-bg"
          color="#000000"
          opacity="0.8"
          width="3"
          height="1.2"
        ></a-plane>
        <a-text
          id="info-panel-name"
          data-role="name"
          value=""
          align="center"
          color="#ffffff"
          scale="1.4 1.4 1.4"
          position="0 0.25 0.01"
        ></a-text>
        <a-text
          id="info-panel-age"
          data-role="age"
          value=""
          align="center"
          color="#ffffff"
          scale="1.1 1.1 1.1"
          position="0 -0.2 0.01"
        ></a-text>
      </a-entity>

      <!-- Person columns injected here by main.js -->
      <a-entity id="people-container" position="0 1.7 0"></a-entity>
    </a-scene>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
