<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>VR Shooter</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <style>
      #score-display {
        position: fixed;
        top: 20px;
        right: 24px;
        color: #111;
        font-family: monospace;
        font-size: 2em;
        font-weight: bold;
        z-index: 999;
        text-shadow: 0 1px 3px rgba(255,255,255,0.8);
        pointer-events: none;
        user-select: none;
      }

      #score-display.flash {
        animation: scoreFlash 0.3s ease-out;
      }

      @keyframes scoreFlash {
        0%   { transform: scale(1.5); color: #e00; }
        100% { transform: scale(1);   color: #111; }
      }

      #crosshair {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 20px;
        height: 20px;
        pointer-events: none;
        z-index: 999;
      }

      #crosshair::before,
      #crosshair::after {
        content: '';
        position: absolute;
        background: rgba(0, 255, 255, 0.8);
      }

      #crosshair::before {
        width: 2px;
        height: 20px;
        left: 9px;
        top: 0;
      }

      #crosshair::after {
        width: 20px;
        height: 2px;
        top: 9px;
        left: 0;
      }
    </style>
  </head>
  <body>
    <div id="score-display">SCORE: 0</div>
    <div id="crosshair"></div>

    <a-scene id="main-scene">
      <a-sky color="#d8d8d8"></a-sky>

      <!-- Floor -->
      <a-plane
        rotation="-90 0 0"
        width="60"
        height="60"
        color="#cccccc"
        roughness="0.9"
        metalness="0.05"
      ></a-plane>

      <!-- Lighting -->
      <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
      <a-light type="directional" color="#ffffff" intensity="1.2" position="2 4 2"></a-light>

      <!-- Camera rig with VR laser controllers and desktop cursor -->
      <a-entity id="rig" position="0 1.6 0">
        <a-camera look-controls wasd-controls>
          <!-- Desktop cursor — hidden dot, raycaster does the work -->
          <a-cursor
            id="cursor"
            color="transparent"
            opacity="0"
            raycaster="objects: .shootable; far: 20"
            fuse="false"
          ></a-cursor>
        </a-camera>

        <!-- VR laser controllers — raycaster configured in JS after laser-controls init -->
        <a-entity id="left-hand" laser-controls="hand: left"></a-entity>
        <a-entity id="right-hand" laser-controls="hand: right"></a-entity>
      </a-entity>

      <!-- Game manager drives all game logic -->
      <a-entity id="game-manager" game-manager></a-entity>

      <!-- Spheres injected here by game-manager -->
      <a-entity id="spheres-container"></a-entity>
    </a-scene>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
