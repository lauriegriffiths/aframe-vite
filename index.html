<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>VR Shooter</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <style>
      #score-display {
        position: fixed;
        top: 20px;
        right: 24px;
        color: #fff;
        font-family: monospace;
        font-size: 2em;
        font-weight: bold;
        z-index: 999;
        text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
        pointer-events: none;
        user-select: none;
      }

      #score-display.flash {
        animation: scoreFlash 0.3s ease-out;
      }

      @keyframes scoreFlash {
        0%   { transform: scale(1.5); color: #ff0; text-shadow: 0 0 20px #ff0; }
        100% { transform: scale(1);   color: #fff; text-shadow: 0 0 10px #0ff; }
      }

      #crosshair {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 20px;
        height: 20px;
        pointer-events: none;
        z-index: 999;
      }

      #crosshair::before,
      #crosshair::after {
        content: '';
        position: absolute;
        background: rgba(0, 255, 255, 0.8);
      }

      #crosshair::before {
        width: 2px;
        height: 20px;
        left: 9px;
        top: 0;
      }

      #crosshair::after {
        width: 20px;
        height: 2px;
        top: 9px;
        left: 0;
      }
    </style>
  </head>
  <body>
    <div id="score-display">SCORE: 0</div>
    <div id="crosshair"></div>

    <a-scene id="main-scene">
      <a-sky color="#0a0a1a"></a-sky>

      <!-- Floor -->
      <a-plane
        rotation="-90 0 0"
        width="60"
        height="60"
        color="#0d0d1a"
        roughness="0.9"
        metalness="0.1"
      ></a-plane>

      <!-- Ambient star-field glow -->
      <a-light type="ambient" color="#112244" intensity="0.5"></a-light>
      <a-light type="directional" color="#4488ff" intensity="0.8" position="2 4 2"></a-light>
      <a-light type="point" color="#ff0066" intensity="0.4" position="0 3 0" distance="15"></a-light>

      <!-- Camera rig with VR laser controllers and desktop cursor -->
      <a-entity id="rig" position="0 1.6 0">
        <a-camera look-controls wasd-controls>
          <!-- Desktop cursor — hidden dot, raycaster does the work -->
          <a-cursor
            id="cursor"
            color="transparent"
            opacity="0"
            raycaster="objects: .shootable; far: 20"
            fuse="false"
          ></a-cursor>
        </a-camera>

        <!-- VR laser controllers -->
        <a-entity
          id="left-hand"
          laser-controls="hand: left"
          raycaster="objects: .shootable; far: 20; lineColor: #00ffff; lineOpacity: 0"
        ></a-entity>
        <a-entity
          id="right-hand"
          laser-controls="hand: right"
          raycaster="objects: .shootable; far: 20; lineColor: #00ffff; lineOpacity: 0"
        ></a-entity>
      </a-entity>

      <!-- Game manager drives all game logic -->
      <a-entity id="game-manager" game-manager></a-entity>

      <!-- Spheres injected here by game-manager -->
      <a-entity id="spheres-container"></a-entity>
    </a-scene>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
